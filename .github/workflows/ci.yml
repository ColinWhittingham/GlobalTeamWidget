name: CI

on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore GlobalTeamWidget.sln

      - name: Build
        run: dotnet build GlobalTeamWidget.sln -c Debug --no-restore

      - name: Test
        run: dotnet test GlobalTeamWidget.Tests/GlobalTeamWidget.Tests.csproj -c Debug --no-restore --logger "trx;LogFileName=test-results.trx"
