name: Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Compute version
        id: version
        shell: bash
        run: |
          BUILD=${{ github.run_number }}
          echo "version=1.0.${BUILD}.0" >> $GITHUB_OUTPUT
          echo "tag=v1.0.${BUILD}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore GlobalTeamWidget.sln

      - name: Build MSIX
        run: |
          dotnet publish GlobalTeamWidget/GlobalTeamWidget.csproj `
            -c Release `
            -r win-x64 `
            -p:AppxPackageSigningEnabled=false `
            -p:AppxPackageVersion=${{ steps.version.outputs.version }}

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: GlobalTeamWidget/bin/Release/**/*.msix
          generate_release_notes: true
          body_prepend: |
            > **Installation:** This package is unsigned. You must enable [Developer Mode](https://learn.microsoft.com/en-us/windows/apps/get-started/enable-your-device-for-development) on the target machine before installing.
