name: Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Compute version
        id: version
        shell: bash
        run: |
          BUILD=${{ github.run_number }}
          echo "version=1.0.${BUILD}.0" >> $GITHUB_OUTPUT
          echo "tag=v1.0.${BUILD}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore GlobalTeamWidget.sln

      - name: Set manifest version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $path = "GlobalTeamWidget/Package.appxmanifest"
          $xml = [xml](Get-Content $path)
          $xml.Package.Identity.Version = $version
          $xml.Save((Resolve-Path $path))
          Write-Host "Manifest version set to $version"

      - name: Build MSIX
        run: |
          dotnet build GlobalTeamWidget/GlobalTeamWidget.csproj `
            -c Release `
            -r win-x64 `
            --no-restore `
            -p:AppxPackageSigningEnabled=false `
            -p:GenerateAppxPackageOnBuild=true `
            -p:UapAppxPackageBuildMode=SideloadOnly

      - name: Locate MSIX
        id: locate
        shell: pwsh
        run: |
          $file = Get-ChildItem -Recurse -Filter "*_x64.msix" | Select-Object -First 1
          if (-not $file) {
            Write-Host "All .msix files found:"
            Get-ChildItem -Recurse -Filter "*.msix" | ForEach-Object { Write-Host $_.FullName }
            Write-Error "No *_x64.msix file found after build"
            exit 1
          }
          Write-Host "Found: $($file.FullName)"
          echo "path=$($file.FullName)" >> $env:GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: ${{ steps.locate.outputs.path }}
          generate_release_notes: true
          append_body: true
          body: |
            > **Installation:** This package is unsigned. You must enable [Developer Mode](https://learn.microsoft.com/en-us/windows/apps/get-started/enable-your-device-for-development) on the target machine before installing.
